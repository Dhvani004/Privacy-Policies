<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #fef6e4;
  }

  h1 {
    margin-top: 20px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }

  .cell {
    width: 100px;
    height: 100px;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background: #ffd6a5;
    border-radius: 10px;
  }

  .cell:hover {
    background: #ffb703;
  }

  #status {
    margin-top: 15px;
    font-size: 18px;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #fb8500;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #e76f51;
  }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<div id="board"></div>

<div id="status">Player X's Turn</div>

<button onclick="resetGame()">Reset Game</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const statusText = document.getElementById("status");
const boardDiv = document.getElementById("board");

const winningConditions = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

function renderBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, index) => {
    const btn = document.createElement("button");
    btn.classList.add("cell");
    btn.innerText = cell;
    btn.onclick = () => handleMove(index);
    boardDiv.appendChild(btn);
  });
}

function handleMove(index) {
  if (board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer;
  checkWinner();
  currentPlayer = currentPlayer === "X" ? "O" : "X";
  renderBoard();

  if (gameActive) {
    statusText.innerText = `Player ${currentPlayer}'s Turn`;
  }
}

function checkWinner() {
  for (let condition of winningConditions) {
    const [a, b, c] = condition;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      statusText.innerText = `🎉 Player ${board[a]} Wins!`;
      gameActive = false;
      return;
    }
  }

  if (!board.includes("")) {
    statusText.innerText = "😅 It's a Draw!";
    gameActive = false;
  }
}

function resetGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  statusText.innerText = "Player X's Turn";
  renderBoard();
}

renderBoard();
</script>

</body>
</html>

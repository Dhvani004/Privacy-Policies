<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TicTac Fun - Play Tic Tac Toe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #fef6e4 0%, #ffd6a5 100%);
    min-height: 100vh;
    margin: 0;
    padding: 0;
    color: #22223b;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    margin-top: 40px;
    text-align: center;
  }
  .logo {
    font-size: 2.5rem;
    font-weight: bold;
    color: #fb8500;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .subtitle {
    font-size: 1.2rem;
    color: #2d3142;
    margin-bottom: 20px;
  }
  .playstore-btn {
    display: inline-flex;
    align-items: center;
    background: #34a853;
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 500;
    margin: 20px 0 30px 0;
    box-shadow: 0 2px 8px rgba(52,168,83,0.15);
    transition: background 0.2s;
  }
  .playstore-btn:hover {
    background: #219150;
  }
  .playstore-btn img {
    width: 24px;
    height: 24px;
    margin-right: 12px;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    gap: 10px;
    justify-content: center;
    margin: 0 auto 20px auto;
    background: #fff;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }
  .cell {
    width: 80px;
    height: 80px;
    font-size: 2rem;
    font-weight: bold;
    cursor: pointer;
    border: none;
    background: #ffd6a5;
    border-radius: 10px;
    transition: background 0.2s;
  }
  .cell:hover {
    background: #ffb703;
  }
  #status {
    margin-top: 10px;
    font-size: 1.1rem;
    font-weight: 500;
    color: #2d3142;
  }
  .reset-btn {
    margin-top: 15px;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: #fb8500;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    font-weight: 500;
    transition: background 0.2s;
  }
  .reset-btn:hover {
    background: #e76f51;
  }
  footer {
    margin-top: 40px;
    font-size: 0.95rem;
    color: #555;
    text-align: center;
  }
  .footer-link {
    color: #3498db;
    text-decoration: none;
    margin-left: 8px;
  }
  .footer-link:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<header>
  <div class="logo">TicTac Fun</div>
  <div class="subtitle">Classic Tic Tac Toe – Play, Compete, Enjoy!</div>
  <a class="playstore-btn" href="https://play.google.com/store/apps/details?id=your.app.package" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Play Store" />
    Get it on Google Play
  </a>
</header>

<div id="board"></div>
<div id="status">Player X's Turn</div>
<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<footer>
  &copy; 2026 TicTac Fun.
  <a class="footer-link" href="privacy.html" target="_blank">Privacy Policy</a>
</footer>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameActive = true;

const statusText = document.getElementById("status");
const boardDiv = document.getElementById("board");

const winningConditions = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

function renderBoard() {
  boardDiv.innerHTML = "";
  board.forEach((cell, index) => {
    const btn = document.createElement("button");
    btn.classList.add("cell");
    btn.innerText = cell;
    btn.onclick = () => handleMove(index);
    boardDiv.appendChild(btn);
  });
}

function handleMove(index) {
  if (board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer;
  checkWinner();
  currentPlayer = currentPlayer === "X" ? "O" : "X";
  renderBoard();

  if (gameActive) {
    statusText.innerText = `Player ${currentPlayer}'s Turn`;
  }
}

function checkWinner() {
  for (let condition of winningConditions) {
    const [a, b, c] = condition;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      statusText.innerText = `🎉 Player ${board[a]} Wins!`;
      gameActive = false;
      return;
    }
  }

  if (!board.includes("")) {
    statusText.innerText = "😅 It's a Draw!";
    gameActive = false;
  }
}

function resetGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  currentPlayer = "X";
  gameActive = true;
  statusText.innerText = "Player X's Turn";
  renderBoard();
}

renderBoard();
</script>

</body>
</html>
